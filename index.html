<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Mundo Barbie!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="contenedor">
        <h1>Bem-vinda ao Meu Mundo!</h1>
        <p>Prepare-se para brilhar com este design mágico de HTML e CSS.</p>
        
        <button class="botao-interativo" onclick="mostrarAlerta()">Explore Agora!</button>

        <button class="botao-ola-mundo" onclick="mostrarOlaMundo()">Olá Mundo! Clique aqui</button>
    </div>

    <script>
        function mostrarAlerta() {
            alert("Uau! Sua jornada no mundo da Barbie começou!");
        }

        function mostrarOlaMundo() {
            alert("Olá Mundo! Seja bem-vindo ao meu primeiro site cor-de-rosa!");
        }
    </script>

</body>
</html>
